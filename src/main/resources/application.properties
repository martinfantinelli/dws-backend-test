server.port=8080

# External API
bands.api.base-url=https://bands-api.vercel.app/api
bands.api.connect-timeout=2s
bands.api.read-timeout=5s

# Cache TTL in minutes (applies to the single "catalog" snapshot)
cache.ttl-minutes=5

# Gzip compression for JSON/text responses
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain
server.compression.min-response-size=1024

# Actuator: expose health + cache stats
management.endpoints.web.exposure.include=health,info,caches,metrics
management.endpoint.health.show-details=always

# Swagger UI  → http://localhost:8080/swagger-ui.html
# OpenAPI JSON → http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
